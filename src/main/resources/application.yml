server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /

spring:
  application:
    name: auth-service

  # JPA/Hibernate Configuration
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: false
    open-in-view: false

  # MySQL Database Configuration
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:spendsmart_auth}?useSSL=${DB_USE_SSL:false}&serverTimezone=UTC&allowPublicKeyRetrieval=true&allowLoadLocal=false
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000



  # Security Configuration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:928257460065-f5b4ncthdi6041hp8r3j14imjg9bvev3.apps.googleusercontent.com}
            client-secret: ${GOOGLE_CLIENT_SECRET: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}
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
            scope: profile,email
            client-name: Google

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false

  # Logging Configuration
  logging:
    config: classpath:logback-spring.xml

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    metadata-map:
      service: ${spring.application.name}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:M4b4B1mesNla14a3Okeb89NVfQOqQnvfsF5rHL+raGqYntqOt++6qIa3J5bFfEvnhoNEOkxE07T0vLW1S44BIg==}
  expiration: 86400000  # 24 hours
  refresh-expiration: 604800000  # 7 days

# Logging configuration
logging:
  level:
    root: INFO
    com.spendsmart.auth: DEBUG
  file:
    name: logs/auth-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  oauth2:
    redirect-success-url: ${OAUTH2_SUCCESS_REDIRECT_URL:http://localhost:5173/oauth/callback}
    redirect-failure-url: ${OAUTH2_FAILURE_REDIRECT_URL:http://localhost:5173/login}
  messaging:
    auth-notification-exchange: ${AUTH_NOTIFICATION_EXCHANGE:spendsmart.auth.events}
    auth-notification-routing-key: ${AUTH_NOTIFICATION_ROUTING_KEY:auth.notification}
    auth-notification-queue: ${AUTH_NOTIFICATION_QUEUE:spendsmart.auth.notifications}

